name: Publish to PyPI

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (skip upload)"
        required: false
        default: "false"
        type: choice
        options:
          - "true"
          - "false"

jobs:
  test:
    name: Tests (publish gate)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - run: make test

  publish:
    needs: test
    runs-on: ubuntu-latest
    # The PyPI trusted publisher was registered with environment "pypi".
    # Declaring it here makes the OIDC token carry that environment claim so it
    # matches (a blank publisher environment also matches, so this is safe).
    environment: pypi
    permissions:
      contents: read
      id-token: write  # OIDC token for PyPI Trusted Publishing (no API token)
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install hatchling twine

      - name: Build
        run: python -m hatchling build

      - name: Check dist
        run: twine check dist/*

      - name: Publish to PyPI (Trusted Publishing / OIDC)
        if: inputs.dry_run == 'false'
        uses: pypa/gh-action-pypi-publish@release/v1

name: Publish to PyPI

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (skip upload)"
        required: false
        default: "false"
        type: choice
        options:
          - "true"
          - "false"

permissions:
  contents: read

jobs:
  version-check:
    name: Version consistency (publish gate)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - name: pyproject version must be unpublished and match the CHANGELOG
        run: |
          set -euo pipefail
          VERSION=$(python3 -c "import tomllib;print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          echo "pyproject version: $VERSION"
          # 1. Refuse to re-publish an existing PyPI release (curl -sf => 404 on unpublished).
          if curl -sf "https://pypi.org/pypi/iil-adrfw/$VERSION/json" >/dev/null 2>&1; then
            echo "::error::version $VERSION is already on PyPI — bump pyproject.version before releasing"
            exit 1
          fi
          # 2. pyproject version must be the top *versioned* CHANGELOG heading
          #    (## [X.Y.Z]; the [Unreleased] section is skipped by the regex).
          TOP=$(grep -oE '^## \[[0-9]+\.[0-9]+\.[0-9]+\]' CHANGELOG.md | head -1 | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' || true)
          echo "CHANGELOG top version: ${TOP:-<none>}"
          if [ "$VERSION" != "$TOP" ]; then
            echo "::error::pyproject version $VERSION does not match CHANGELOG top ${TOP:-<none>}"
            exit 1
          fi
          echo "✓ $VERSION is unpublished and matches the CHANGELOG top entry"

  test:
    name: Tests (publish gate)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - run: pip install -e ".[dev]"
      - run: make test

  publish:
    needs: [version-check, test]
    runs-on: ubuntu-latest
    # The PyPI trusted publisher was registered with environment "pypi".
    # Declaring it here makes the OIDC token carry that environment claim so it
    # matches (a blank publisher environment also matches, so this is safe).
    environment: pypi
    permissions:
      contents: read
      id-token: write  # OIDC token for PyPI Trusted Publishing (no API token)
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install hatchling twine

      - name: Build
        run: python -m hatchling build

      - name: Check dist
        run: twine check dist/*

      - name: Publish to PyPI (Trusted Publishing / OIDC)
        if: inputs.dry_run == 'false'
        uses: pypa/gh-action-pypi-publish@release/v1
